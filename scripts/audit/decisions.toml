# --- RUF001: ambiguous-unicode literals the parser/GUI must handle ---
# These are real-world filename/title characters (curly apostrophes in
# contractions, en dashes in ranges, fullwidth pipes, angle-quote chevrons)
# that source media filenames and titles actually contain. Replacing them
# with the ASCII "look-alike" ruff suggests would change parsing/matching
# behavior and break the fixtures that exercise these exact characters.

[[decision]]
analyzer = "ruff"
rule = "RUF001"
path = "plex_renamer/_parsing_names.py"
symbol = "plex_renamer._parsing_names._fold_title_symbols::ambiguous-unicode-character-string::String contains ambiguous `’` (RIGHT SINGLE QUOTATION MARK). Did you mean ``` (GRAVE ACCENT)?#1"
reason_code = "intentional-literal"
reason = "Curly right single quotation mark in the I’m/I'm contraction pattern that _fold_title_symbols must recognize in real filenames; replacing it would stop matching titles that use the typographic apostrophe."

[[decision]]
analyzer = "ruff"
rule = "RUF001"
path = "plex_renamer/_parsing_names.py"
symbol = "plex_renamer._parsing_names.normalize_for_match::ambiguous-unicode-character-string::String contains ambiguous `’` (RIGHT SINGLE QUOTATION MARK). Did you mean ``` (GRAVE ACCENT)?#1"
reason_code = "intentional-literal"
reason = "Curly right single quotation mark that normalize_for_match strips (alongside the straight apostrophe) so \"Hell’s\" and \"Hells\" compare equal; this is the specific character real titles carry."

[[decision]]
analyzer = "ruff"
rule = "RUF001"
