# Dependency contracts: exact cycle baseline plus forbidden import directions.
[cycles]
baseline = "cycle-baseline.json"

[[forbid]]
from = "plex_renamer.engine"
to = "plex_renamer.gui_qt"
reason = "engine must stay headless - GUI depends on engine, never the reverse"

[[forbid]]
from = "plex_renamer.engine"
to = "plex_renamer.app"
reason = "engine is the bottom layer - orchestration imports engine, not the reverse"
