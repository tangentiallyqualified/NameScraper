schema_version = 1

[quality]
max_cyclomatic_complexity = 10
max_python_file_loc = 500
changed_line_min_percent = 80.0

[format]
line_length = 100

[lint]
select = ["E4", "E7", "E9", "F", "I", "UP", "B", "C4", "SIM", "PIE", "RUF"]

[[lint.exceptions]]
target = "plex_renamer/gui_qt/**/*.py"
rule = "B008"
reason_code = "framework-callback"
reason = "Qt override signatures legitimately use QModelIndex() default arguments required by the framework."

[[lint.exceptions]]
target = "plex_renamer/gui_qt/**/*.py"
rule = "RUF012"
reason_code = "framework-callback"
reason = "Qt signal and model class attributes are framework-managed descriptors, not mutable instance state."

[[lint.exceptions]]
target = "tests/**/*.py"
rule = "RUF012"
reason_code = "test-seam"
reason = "Test fakes intentionally use concise mutable class attributes as a test seam."
